name: Playwright Tests Regression Suite
on:
  # Triggers the pipeline automatically when code is pushed to the main branch
  push:
    branches: [ main, master ]
  # Triggers the pipeline when someone opens a Pull Request against the main branch
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    # Uses a clean Ubuntu Linux virtual machine provided by GitHub
    runs-on: ubuntu-latest
    
    steps:
    # 1. Downloads a copy of your code repository onto the virtual machine
    - uses: actions/checkout@v4

    # 2. Installs Node.js environment
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    # 3. Installs project dependencies (Playwright, packages, etc.)
    - name: Install dependencies
      run: npm ci

    # 4. Installs the actual browsers (Chromium, Firefox) needed by Playwright
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    # 5. Executes your targeted suite (running your OR logic tags as an example)
    - name: Run Playwright tests
      run: npx playwright test GooglePage.spec.ts

    # 6. Uploads the HTML test report so you can download and view it if a test fails
    - name: Upload Test Report Artifact
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

         # NEW STEP: Automatically triggers after tests complete
    - name: Send Email Test Summary
      uses: dawidd6/action-send-mail@v4
      if: always() # Ensures the mail triggers on Success OR Failure
      with:
        # SMTP Server Configuration (Example using Gmail)
        server_address: smtp.gmail.com
        server_port: 465
        secure: true
        
        # Authenticate using your secure repository secrets
        username: ${{ secrets.MAIL_USERNAME }}
        password: ${{ secrets.MAIL_PASSWORD }}
        
        # Email Content Configuration
        subject: "Playwright Automation Suite Run - ${{ job.status }}"
        to: ktselvan4029@gmail.com
        from: QA Automation Server <${{ secrets.MAIL_USERNAME }}>

        # Markdown body parsed directly into an HTML layout
        convert_markdown: true
        html_body: |
          ### Playwright Execution Summary
          * **Repository:** ${{ github.repository }}
          * **Triggered By:** `${{ github.actor }}`
          * **Workflow Status:** **${{ job.status }}**
          attachments: playwright-report/index.html
